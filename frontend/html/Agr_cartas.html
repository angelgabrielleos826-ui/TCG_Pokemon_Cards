<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Agregar Carta</title>
    <link rel="stylesheet" href="../css/Agr_cartas.css">
</head>

<body>

    <div class="form-card">

        <!-- FORMULARIO -->
        <div class="form-section">
            <h2>Agregar Carta</h2>

            <form id="cardForm">

                <div class="form-group">
                    <label>Nombre</label>
                    <input type="text" name="name" required>
                </div>

                <div class="form-group">
                    <label>Imagen (URL)</label>
                    <input type="text" id="imageInput" name="image" required>
                </div>

                <div class="form-group">
                    <label>Precio</label>
                    <input type="number" name="price" required>
                </div>

                <div class="form-group">
                    <label>Stock</label>
                    <input type="number" name="stock" required>
                </div>

                <button type="submit" class="btn-crear">
                    Crear Carta
                </button>

            </form>
        </div>

        <!-- VISTA PREVIA -->
        <div class="preview-section">
            <h3>Vista previa</h3>
            <img id="previewImg" src="" alt="Vista previa">
        </div>

    </div>

    <div class="volver-menu">
    <a href="../../index.html" class="btn-volver">← Volver al Menú</a>
    </div>

    <script src="../js/Agr_cartas.js"></script>

</body>
</html>
