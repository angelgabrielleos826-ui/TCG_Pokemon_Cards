<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tienda TCG</title>
    <link rel="stylesheet" href="../css/EstiloCart.css">
</head>
<body>

<h1>Tienda TCG</h1>
<button id="btnMoneda">Cambiar a USD</button>
<div class="contenedor">

    <section class="productos" id="productos"></section>

    <aside class="carrito">
        <h2> Carrito</h2>
        <ul id="listaCarrito"></ul>
        <p class="total">Total: <span id="total">$0.00 MXN</span></p>
        <button onclick="vaciarCarrito()">Vaciar carrito</button>
        <button class="btn-pagar" id="btnPagar" onclick="abrirModalPago()"> Pagar</button>
    </aside>

</div>

<!-- MODAL DE PAGO -->
<div class="modal-overlay" id="modalPago">
    <div class="modal">

        <button class="modal-close" onclick="cerrarModalPago()">X</button>

        <div id="formPago">
            <h2> Finalizar Compra</h2>

            <div class="resumen-pago">
                <span>Total a pagar:</span>
                <span id="totalModal">$0.00 MXN</span>
            </div>

            <div class="form-seccion">
                <h3> Datos de Envío</h3>
                <div class="form-grupo">
                    <div class="campo">
                        <label>Nombre completo</label>
                        <input type="text" id="fullName" placeholder="Ej. Juan Pérez García" />
                    </div>
                    <div class="campo">
                        <label>Teléfono</label>
                        <input type="tel" id="phone" placeholder="Ej. 8112345678" maxlength="10" />
                    </div>
                    <div class="campo">
                        <label>Dirección</label>
                        <input type="text" id="address" placeholder="Calle, número, colonia" />
                    </div>
                    <div class="form-fila">
                        <div class="campo">
                            <label>Ciudad</label>
                            <input type="text" id="city" placeholder="Ej. Monterrey" />
                        </div>
                        <div class="campo">
                            <label>Código Postal</label>
                            <input type="text" id="zip" placeholder="Ej. 64000" maxlength="5" />
                        </div>
                    </div>
                </div>
            </div>

            <div class="form-seccion">
                <h3> Datos de Tarjeta</h3>
                <div class="form-grupo">
                    <div class="campo">
                        <label>Tipo de tarjeta</label>
                        <select id="cardType">
                            <option value="">-- Selecciona --</option>
                            <option value="visa">Visa</option>
                            <option value="mastercard">Mastercard</option>
                            <option value="amex">American Express</option>
                        </select>
                    </div>
                    <div class="campo">
                        <label>Nombre en la tarjeta</label>
                        <input type="text" id="cardHolder" placeholder="Como aparece en tu tarjeta" />
                    </div>
                    <div class="campo">
                        <label>Número de tarjeta</label>
                        <input type="text" id="cardNumber" placeholder="1234 5678 9012 3456" maxlength="19" />
                    </div>
                    <div class="form-fila">
                        <div class="campo">
                            <label>Fecha de vencimiento</label>
                            <input type="text" id="cardExpiry" placeholder="MM/AA" maxlength="5" />
                        </div>
                        <div class="campo">
                            <label>CVV</label>
                            <input type="text" id="cardCVV" placeholder="123" maxlength="3" />
                        </div>
                    </div>
                </div>
            </div>

            <p class="error-msg" id="errorMsg"> Por favor llena todos los campos.</p>

            <button class="btn-confirmar" id="btnConfirmar" onclick="confirmarCompra()">
                Confirmar Compra
            </button>
        </div>

        <div class="mensaje-exito" id="mensajeExito">
            <div class="icono"></div>
            <h3>¡Compra realizada!</h3>
            <p>Tu pedido ha sido registrado correctamente.<br>¡Gracias por tu compra!</p>
        </div>

        <section id="ticketContainer" class="ticket-container"></section>

    </div>
</div>

<script src="../js/cartManager.js"></script>
<script src="../js/Script.js"></script>
<script src="../js/cardPaje.js"></script>
<script src="../js/checkout.js"></script>
</body>
</html>
