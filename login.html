<!DOCTYPE html>
<html lang="es">
<head>

    <meta charset="UTF-8">
    <title>TCG Manager - Inicio</title>
    <meta http-equiv="refresh" content="0; url=http://localhost:5173/login">
    <link rel="stylesheet" href="frente/css/login.css">
</head>
<body>
    <noscript>
        <p style="text-align:center; margin-top:20px;">
            Redirigiendo a <a href="http://localhost:5173/login">Marketplace Login</a>
        </p>
    </noscript>
    <div class="login-container">
        <h1>Iniciar Sesión</h1>

        <form id="login-form">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>

            <label for="password">Contraseña:</label>
            <input type="password" id="password" name="password" required>

            <button type="submit">Iniciar Sesión</button>
        </form>

        <p>¿No tiene cuenta? <a href="frente/html/register.html">Regístrate aquí</a></p>
        <p><a href="http://localhost:5173/community">Ir a Marketplace</a></p>

        <div id="error-msg" style="color:red; margin-top:10px;"></div>
    </div>

    <script src="frente/js/login.js"></script>
</body>
</html>
